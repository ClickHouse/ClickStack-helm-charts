name: Helm Chart Tests

on:
  push:
    branches: [ main ]
    paths: &paths
      - 'charts/**'
      - 'examples/**'
      - 'Makefile'
      - 'scripts/**'
      - '.githooks/**'
      - '.github/workflows/helm-test.yaml'
  pull_request:
    branches: [ main ]
    paths: *paths

permissions:
  contents: read

jobs:
  helm-unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Install tools, run unit tests, verify docs
        run: make ci-setup test docs-check

  helmcov:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Build chart dependencies
        run: make chart-deps

      - name: Load pinned helmcov version and threshold
        run: grep -E '^(HELMCOV_VERSION|COVERAGE_THRESHOLD)=' scripts/tool-versions.env >> "$GITHUB_ENV"

      - name: Run helmcov
        uses: jordan-simonovski/helmcov@6346c80e742f697b55b2cb9fe6b9af72a71960ce  # v1
        with:
          chart: charts/clickstack
          tests: charts/clickstack/tests
          threshold: ${{ env.COVERAGE_THRESHOLD }}
          version: ${{ env.HELMCOV_VERSION }}
