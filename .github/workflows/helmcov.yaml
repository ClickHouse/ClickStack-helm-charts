name: Helm Template Coverage

on:
  push:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/helmcov.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'charts/**'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/helmcov.yaml'

permissions:
  contents: read
  pull-requests: write

jobs:
  helmcov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.0

      - name: Build chart dependencies
        run: make chart-deps

      - name: Run helmcov
        uses: jordan-simonovski/helmcov@v1
        with:
          chart: charts/clickstack
          tests: charts/clickstack/tests
          threshold: "30"
