suite: Test ClickStack Secret Custom Values
templates:
  - hyperdx/secret.yaml
values:
  - values/secret-custom.yaml
tests:
  - it: should render custom secret values
    asserts:
      - equal:
          path: stringData.HYPERDX_API_KEY
          value: custom-api-key
      - equal:
          path: stringData.CLICKHOUSE_APP_PASSWORD
          value: custom-app-password
