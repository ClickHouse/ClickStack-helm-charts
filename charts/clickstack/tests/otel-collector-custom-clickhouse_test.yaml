suite: test OTEL collector with custom clickhouse endpoint
templates:
  - otel-collector-env.yaml

tests:
  - it: should use default ClickHouse endpoint when not specified
    set:
      otel:
        enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["env.sh"]
          pattern: "CLICKHOUSE_ENDPOINT.*tcp://.*-clickhouse:[0-9]+\\?dial_timeout=10s"

  - it: should use custom ClickHouse endpoint when specified
    set:
      otel:
        enabled: true
        clickhouseEndpoint: "my-custom-clickhouse:9000"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["env.sh"]
          pattern: 'CLICKHOUSE_ENDPOINT="my-custom-clickhouse:9000"'
