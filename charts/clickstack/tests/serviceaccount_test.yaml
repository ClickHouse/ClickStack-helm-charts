suite: Test ServiceAccount
templates:
  - hyperdx/serviceaccount.yaml
tests:
  - it: should not render ServiceAccount when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceAccount when enabled
    set:
      hyperdx:
        serviceAccount:
          enabled: true
    asserts:
      - isKind:
          of: ServiceAccount
      - matchRegex:
          path: metadata.name
          pattern: -app$

  - it: should use fullnameOverride for ServiceAccount name
    set:
      fullnameOverride: hyperdx-api
      hyperdx:
        serviceAccount:
          enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: hyperdx-api

  - it: should render annotations when provided
    set:
      hyperdx:
        serviceAccount:
          enabled: true
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::123456789:role/my-role"
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::123456789:role/my-role"

  - it: should not render annotations section when empty
    set:
      hyperdx:
        serviceAccount:
          enabled: true
          annotations: {}
    asserts:
      - isNull:
          path: metadata.annotations
