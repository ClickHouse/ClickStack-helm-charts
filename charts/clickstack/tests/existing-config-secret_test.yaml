suite: Test Deployment Existing Config Secret
templates:
  - hyperdx/deployment.yaml
values:
  - values/existing-config-secret.yaml
tests:
  - it: should load default connections from existing secret
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: external-hyperdx-config
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: connections.json
