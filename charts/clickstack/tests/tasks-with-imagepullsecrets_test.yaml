suite: Test Check Alerts CronJob With Image Pull Secrets
templates:
  - hyperdx/cronjob-check-alerts.yaml
values:
  - values/tasks-with-imagepullsecrets.yaml
tests:
  - it: should render imagePullSecrets on cronjob pod spec
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.imagePullSecrets[0].name
          value: regcred
