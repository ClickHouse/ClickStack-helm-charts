hyperdx:
  deployment:
    labels:
      team: observability
    annotations:
      prometheus.io/scrape: "true"
    nodeSelector:
      kubernetes.io/os: linux
    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: clickstack
    priorityClassName: high-priority
    initContainers:
      - name: custom-init
        image: busybox:1.36
        command: ["sh", "-c", "echo init"]
    volumes:
      - name: cache
        emptyDir: {}
    volumeMounts:
      - name: cache
        mountPath: /cache
    env:
      - name: CUSTOM_ENV
        value: test
  serviceAccount:
    create: true
global:
  imagePullSecrets:
    - name: regcred
