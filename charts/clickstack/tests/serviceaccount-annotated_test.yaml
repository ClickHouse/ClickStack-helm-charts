suite: Test ServiceAccount Annotations
templates:
  - hyperdx/serviceaccount.yaml
values:
  - values/serviceaccount-annotated.yaml
tests:
  - it: should render service account annotations
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/hyperdx
