suite: Test Deployment Default Sources Tpl
templates:
  - hyperdx/deployment.yaml
values:
  - values/deployment-tpl-defaults.yaml
tests:
  - it: should render tpl-interpolated default connections and sources
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="DEFAULT_CONNECTIONS")].value
          pattern: '"host": "http://RELEASE-NAME-clickstack-clickhouse-clickhouse-headless:8123"'
      - matchRegex:
          path: spec.template.spec.containers[0].env[?(@.name=="DEFAULT_SOURCES")].value
          pattern: '"tableName": "otel_logs"'
