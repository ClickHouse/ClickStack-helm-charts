# -- Global defaults applied across chart workloads.
global:
  # -- Optional prefix for container images (e.g. registry.example.com/).
  imageRegistry: ""
  # -- Image pull secrets for private registries. Helps avoid Docker Hub rate limits.
  imagePullSecrets: []

hyperdx:
  # -- Ports shared across Deployment, Service, ConfigMap, and Ingress.
  ports:
    api: 8000
    app: 3000
    opamp: 4320

  # -- Shared non-sensitive environment variables (clickstack-config ConfigMap).
  # Used by HyperDX and OTEL collector via envFrom. Values support tpl expressions.
  # Override entries with plain strings to point at external services.
  config:
    APP_PORT: "3000"
    API_PORT: "8000"
    HYPERDX_API_PORT: "8000"
    HYPERDX_APP_PORT: "3000"
    HYPERDX_LOG_LEVEL: "info"
    OTEL_SERVICE_NAME: "hdx-oss-api"
    USAGE_STATS_ENABLED: "true"
    OPAMP_PORT: "4320"
    HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: "default"
    CLICKHOUSE_USER: "otelcollector"
    RUN_SCHEDULED_TASKS_EXTERNALLY: "false"
    # Service endpoint defaults -- override to use external instances
    FRONTEND_URL: "http://localhost:3000"
    MONGO_URI: 'mongodb://hyperdx:{{ .Values.hyperdx.secrets.MONGODB_PASSWORD }}@{{ include "clickstack.mongodb.svc" . }}:27017/hyperdx?authSource=hyperdx'
    OTEL_EXPORTER_OTLP_ENDPOINT: 'http://{{ include "clickstack.otel.fullname" . }}:4318'
    CLICKHOUSE_ENDPOINT: 'tcp://{{ include "clickstack.clickhouse.svc" . }}:{{ .Values.clickhouse.nativePort }}?dial_timeout=10s'
    CLICKHOUSE_SERVER_ENDPOINT: '{{ include "clickstack.clickhouse.svc" . }}:{{ .Values.clickhouse.nativePort }}'
    CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT: '{{ include "clickstack.clickhouse.svc" . }}:{{ .Values.clickhouse.prometheus.port }}'
    OPAMP_SERVER_URL: 'http://{{ include "clickstack.hyperdx.fullname" . }}:{{ .Values.hyperdx.ports.opamp }}'

  # -- Shared sensitive environment variables (clickstack-secret).
  # Set to null to skip Secret creation (requires mongodb, clickhouse, and otel-collector disabled).
  secrets:
    HYPERDX_API_KEY: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    CLICKHOUSE_PASSWORD: "otelcollectorpass"
    CLICKHOUSE_APP_PASSWORD: "hyperdx"
    MONGODB_PASSWORD: "hyperdx"

  # -- HyperDX Deployment spec (image, probes, scheduling, init containers, volumes).
  # defaultConnections/defaultSources JSON: set to "" to disable; use useExistingConfigSecret for external secrets.
  deployment:
    image:
      # -- HyperDX container image repository.
      repository: docker.hyperdx.io/hyperdx/hyperdx
      # -- Image tag. Defaults to Chart appVersion when empty.
      tag:
      pullPolicy: IfNotPresent
    # -- Pod replica count. Ignored when hyperdx.autoscaling.enabled is true.
    replicas: 1
    resources: {}
    livenessProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      enabled: true
      initialDelaySeconds: 1
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []
    priorityClassName: ""
    annotations: {}
    labels: {}
    env: []
    # -- Additional init containers to run before the HyperDX container starts.
    initContainers: []
    # -- Additional volumes to attach to the pod.
    volumes: []
    # -- Additional volume mounts for the HyperDX container.
    volumeMounts: []
    waitForMongodb:
      image: "busybox@sha256:1fcf5df59121b92d61e066df1788e8df0cc35623f5d62d9679a41e163b6a0cdb"
      pullPolicy: IfNotPresent
    # -- Load HyperDX connections JSON from an existing Secret instead of defaultConnections.
    useExistingConfigSecret: false
    # -- Secret containing connections and sources JSON when useExistingConfigSecret is true.
    existingConfigSecret: ""
    existingConfigConnectionsKey: "connections.json"
    existingConfigSourcesKey: "sources.json"
    defaultConnections: |
      [
        {
          "name": "Local ClickHouse",
          "host": "http://{{ include "clickstack.clickhouse.svc" . }}:8123",
          "port": 8123,
          "username": "app",
          "password": "{{ .Values.hyperdx.secrets.CLICKHOUSE_APP_PASSWORD }}"
        }
      ]
    defaultSources: |
      [
        {
          "from": {
            "databaseName": "default",
            "tableName": "otel_logs"
          },
          "kind": "log",
          "timestampValueExpression": "Timestamp",
          "name": "Logs",
          "displayedTimestampValueExpression": "Timestamp",
          "implicitColumnExpression": "Body",
          "serviceNameExpression": "ServiceName",
          "bodyExpression": "Body",
          "eventAttributesExpression": "LogAttributes",
          "resourceAttributesExpression": "ResourceAttributes",
          "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
          "severityTextExpression": "SeverityText",
          "traceIdExpression": "TraceId",
          "spanIdExpression": "SpanId",
          "connection": "Local ClickHouse",
          "traceSourceId": "Traces",
          "sessionSourceId": "Sessions",
          "metricSourceId": "Metrics"
        },
        {
          "from": {
            "databaseName": "default",
            "tableName": "otel_traces"
          },
          "kind": "trace",
          "timestampValueExpression": "Timestamp",
          "name": "Traces",
          "displayedTimestampValueExpression": "Timestamp",
          "implicitColumnExpression": "SpanName",
          "serviceNameExpression": "ServiceName",
          "bodyExpression": "SpanName",
          "eventAttributesExpression": "SpanAttributes",
          "resourceAttributesExpression": "ResourceAttributes",
          "defaultTableSelectExpression": "Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName",
          "traceIdExpression": "TraceId",
          "spanIdExpression": "SpanId",
          "durationExpression": "Duration",
          "durationPrecision": 9,
          "parentSpanIdExpression": "ParentSpanId",
          "spanNameExpression": "SpanName",
          "spanKindExpression": "SpanKind",
          "statusCodeExpression": "StatusCode",
          "statusMessageExpression": "StatusMessage",
          "connection": "Local ClickHouse",
          "logSourceId": "Logs",
          "sessionSourceId": "Sessions",
          "metricSourceId": "Metrics"
        },
        {
          "from": {
            "databaseName": "default",
            "tableName": ""
          },
          "kind": "metric",
          "timestampValueExpression": "TimeUnix",
          "name": "Metrics",
          "resourceAttributesExpression": "ResourceAttributes",
          "metricTables": {
            "gauge": "otel_metrics_gauge",
            "histogram": "otel_metrics_histogram",
            "sum": "otel_metrics_sum",
            "_id": "682586a8b1f81924e628e808",
            "id": "682586a8b1f81924e628e808"
          },
          "connection": "Local ClickHouse",
          "logSourceId": "Logs",
          "traceSourceId": "Traces",
          "sessionSourceId": "Sessions"
        },
        {
          "from": {
            "databaseName": "default",
            "tableName": "hyperdx_sessions"
          },
          "kind": "session",
          "timestampValueExpression": "TimestampTime",
          "name": "Sessions",
          "displayedTimestampValueExpression": "Timestamp",
          "implicitColumnExpression": "Body",
          "serviceNameExpression": "ServiceName",
          "bodyExpression": "Body",
          "eventAttributesExpression": "LogAttributes",
          "resourceAttributesExpression": "ResourceAttributes",
          "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
          "severityTextExpression": "SeverityText",
          "traceIdExpression": "TraceId",
          "spanIdExpression": "SpanId",
          "connection": "Local ClickHouse",
          "logSourceId": "Logs",
          "traceSourceId": "Traces",
          "metricSourceId": "Metrics"
        }
      ]

  # -- HyperDX Service (ClusterIP by default).
  service:
    type: ClusterIP
    annotations: {}
    # -- Expose the API port (8000) on the Service for API-only or direct API access.
    apiPort:
      enabled: false

  # -- Ingress for HyperDX. annotations and spec are rendered verbatim (nginx, ALB, Traefik, etc.).
  # Use additionalIngresses for multi-ingress setups (e.g. separate OTEL collector ingress).
  ingress:
    enabled: false
    annotations: {}
    spec: {}
    additionalIngresses: []

  # -- PodDisruptionBudget for the HyperDX Deployment.
  podDisruptionBudget:
    enabled: false

  # -- HorizontalPodAutoscaler for HyperDX. spec is passed through verbatim (autoscaling/v2).
  # Do not include scaleTargetRef — the chart auto-wires it. Omitting replicas when enabled.
  autoscaling:
    enabled: false
    spec: {}

  # -- NetworkPolicy for HyperDX. spec is passed through verbatim.
  networkPolicy:
    enabled: false
    spec: {}

  # -- ServiceAccount for HyperDX. Set create: true to provision one; use annotations for IRSA/GCP bindings.
  serviceAccount:
    create: false
    # -- ServiceAccount name. Defaults to chart fullname when create is true and name is empty.
    name: ""
    annotations: {}

  # -- Scheduled HyperDX background tasks (CronJobs).
  tasks:
    enabled: false
    checkAlerts:
      schedule: "*/1 * * * *"
      additionalArgs: {}
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi

# -- In-cluster MongoDB via MongoDBCommunity CR. Set enabled: false for external MongoDB.
mongodb:
  enabled: true
  # -- MongoDBCommunity CRD spec (rendered verbatim). See MongoDB Kubernetes Operator docs.
  spec:
    members: 1
    type: ReplicaSet
    version: "5.0.32"
    security:
      authentication:
        modes: ["SCRAM"]
    users:
      - name: hyperdx
        db: hyperdx
        passwordSecretRef:
          name: '{{ include "clickstack.mongodb.fullname" . }}-password'
        roles:
          - name: dbOwner
            db: hyperdx
          - name: clusterMonitor
            db: admin
        scramCredentialsSecretName: '{{ include "clickstack.mongodb.fullname" . }}-scram'
    additionalMongodConfig:
      storage.wiredTiger.engineConfig.journalCompressor: zlib

# -- In-cluster ClickHouse via ClickHouseCluster CR. Set enabled: false for external ClickHouse.
clickhouse:
  enabled: true
  # -- HTTP interface port for in-cluster connections.
  port: 8123
  # -- Native TCP port used in connection strings.
  nativePort: 9000
  prometheus:
    # -- Expose ClickHouse Prometheus metrics endpoint.
    enabled: true
    port: 9363
  # -- KeeperCluster CRD spec (rendered verbatim). See ClickHouse Operator docs.
  keeper:
    spec:
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  # -- ClickHouseCluster CRD spec (rendered verbatim). See ClickHouse Operator docs.
  cluster:
    spec:
      containerTemplate:
        image:
          repository: clickhouse/clickhouse-server
          tag: "25.7-alpine"
      replicas: 1
      shards: 1
      keeperClusterRef:
        name: '{{ include "clickstack.clickhouse.keeper" . }}'
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
      settings:
        extraUsersConfig:
          users:
            app:
              password: '{{ .Values.hyperdx.secrets.CLICKHOUSE_APP_PASSWORD }}'
              profile: default
              grants:
                - query: "GRANT SHOW ON *.*, SELECT ON system.*, SELECT ON default.*"
            otelcollector:
              password: '{{ .Values.hyperdx.secrets.CLICKHOUSE_PASSWORD }}'
              profile: default
              grants:
                - query: "GRANT SELECT,INSERT,CREATE,SHOW ON default.*"
        extraConfig:
          max_connections: 4096
          keep_alive_timeout: 64
          max_concurrent_queries: 100

# -- Additional Kubernetes manifests deployed alongside the chart (supports tpl).
# See docs/ADDITIONAL-MANIFESTS.md for examples.
additionalManifests: []

# -- OpenTelemetry Collector subchart. Set enabled: false to use an external collector.
otel-collector:
  # -- Deploy the bundled OpenTelemetry Collector subchart.
  enabled: true
  mode: deployment
  image:
    repository: docker.clickhouse.com/clickhouse/clickstack-otel-collector
    tag: "2.19.0"
  extraEnvsFrom:
    - configMapRef:
        name: clickstack-config
    - secretRef:
        name: clickstack-secret
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
      appProtocol: grpc
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP
    fluentd:
      enabled: true
      containerPort: 24225
      servicePort: 24225
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false

