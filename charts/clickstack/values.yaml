global:
  imageRegistry: ""
  # List of image pull secrets to use for pulling images from private registries
  # This helps avoid rate limiting (429 errors) when pulling from Docker Hub
  # Example:
  # imagePullSecrets:
  #   - name: regcred
  #   - name: docker-hub-secret
  imagePullSecrets: []
  storageClassName: "local-path"
  # Keep PVCs when uninstalling helm release to preserve data
  keepPVC: false

hyperdx:
  image:
    repository: docker.hyperdx.io/hyperdx/hyperdx
    tag:
    pullPolicy: IfNotPresent
  waitForMongodb:
    # Image used by the init container that waits for MongoDB to be reachable.
    image: "busybox@sha256:1fcf5df59121b92d61e066df1788e8df0cc35623f5d62d9679a41e163b6a0cdb"
    pullPolicy: IfNotPresent
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    initialDelaySeconds: 1
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # Add nodeSelector and tolerations for hyperdx service
  nodeSelector:
    {}
    # Example:
    # kubernetes.io/os: linux
    # node-role.kubernetes.io/worker: "true"
  tolerations:
    []
    # Example:
    # - key: "key1"
    #   operator: "Equal"
    #   value: "value1"
    #   effect: "NoSchedule"
  apiPort: 8000
  appPort: 3000
  opampPort: 4320

  # Shared non-sensitive environment variables rendered into the clickstack-config ConfigMap.
  # Used by both the HyperDX app and the OTEL collector (via envFrom).
  config:
    APP_PORT: "3000"
    API_PORT: "8000"
    HYPERDX_API_PORT: "8000"
    HYPERDX_APP_PORT: "3000"
    HYPERDX_LOG_LEVEL: "info"
    OTEL_SERVICE_NAME: "hdx-oss-api"
    USAGE_STATS_ENABLED: "true"
    OPAMP_PORT: "4320"
    HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE: "default"
    CLICKHOUSE_USER: "otelcollector"
    RUN_SCHEDULED_TASKS_EXTERNALLY: "false"

  # Shared sensitive environment variables rendered into the clickstack-secret Secret.
  # Used by both the HyperDX app and the OTEL collector (via envFrom).
  secrets:
    HYPERDX_API_KEY: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    CLICKHOUSE_PASSWORD: "otelcollectorpass"

  # deprecated: use frontendUrl instead
  appUrl: "http://localhost"
  # The URL that will be use to access the frontend. Defaults to the http://localhost:3000.
  # If you have an ingress enabled, you should set this to the ingress host with the protocol. E.g. https://hdx-my-domain.com
  frontendUrl: "{{ .Values.hyperdx.appUrl }}:{{ .Values.hyperdx.appPort }}"
  # Endpoint to send hyperdx logs/traces/metrics to. Defaults to the chart's otel collector endpoint.
  otelExporterEndpoint: http://{{ include "clickstack.otel.fullname" . }}:4318
  mongoUri: mongodb://hyperdx:{{ .Values.mongodb.password }}@{{ include "clickstack.mongodb.svc" . }}:27017/hyperdx?authSource=hyperdx

  # Pod-level annotations (applied to the deployment pods)
  annotations:
    {}
    # myAnnotation: "myValue"

  # Pod-level labels (applied to the deployment pods)
  labels:
    {}
    # myLabel: "myValue"
  env:
    []
    # Additional environment variables can be configured here
    # This is preserved for backward compatibility and advanced use cases

  # Default connections and sources (ENABLED BY DEFAULT)
  # Set to empty string to disable: defaultConnections: "" or defaultSources: ""
  #
  # To use an existing secret instead of inline configuration, set:
  # useExistingConfigSecret: true
  # existingConfigSecret: "my-hyperdx-config"
  # existingConfigConnectionsKey: "connections.json"  # defaults to "connections.json"
  # existingConfigSourcesKey: "sources.json"  # defaults to "sources.json"
  #
  # The secret should contain separate keys for connections and sources JSON arrays
  useExistingConfigSecret: false
  existingConfigSecret: ""
  existingConfigConnectionsKey: "connections.json"
  existingConfigSourcesKey: "sources.json"

  defaultConnections: |
    [
      {
        "name": "Local ClickHouse",
        "host": "http://{{ include "clickstack.clickhouse.svc" . }}:8123",
        "port": 8123,
        "username": "app",
        "password": "{{ .Values.clickhouse.config.users.appUserPassword }}"
      }
    ]

  # Set to empty string to disable: defaultSources: ""
  defaultSources: |
    [
      {
        "from": {
          "databaseName": "default",
          "tableName": "otel_logs"
        },
        "kind": "log",
        "timestampValueExpression": "TimestampTime",
        "name": "Logs",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "Body",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "Body",
        "eventAttributesExpression": "LogAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
        "severityTextExpression": "SeverityText",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "connection": "Local ClickHouse",
        "traceSourceId": "Traces",
        "sessionSourceId": "Sessions",
        "metricSourceId": "Metrics"
      },
      {
        "from": {
          "databaseName": "default",
          "tableName": "otel_traces"
        },
        "kind": "trace",
        "timestampValueExpression": "Timestamp",
        "name": "Traces",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "SpanName",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "SpanName",
        "eventAttributesExpression": "SpanAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "durationExpression": "Duration",
        "durationPrecision": 9,
        "parentSpanIdExpression": "ParentSpanId",
        "spanNameExpression": "SpanName",
        "spanKindExpression": "SpanKind",
        "statusCodeExpression": "StatusCode",
        "statusMessageExpression": "StatusMessage",
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "sessionSourceId": "Sessions",
        "metricSourceId": "Metrics"
      },
      {
        "from": {
          "databaseName": "default",
          "tableName": ""
        },
        "kind": "metric",
        "timestampValueExpression": "TimeUnix",
        "name": "Metrics",
        "resourceAttributesExpression": "ResourceAttributes",
        "metricTables": {
          "gauge": "otel_metrics_gauge",
          "histogram": "otel_metrics_histogram",
          "sum": "otel_metrics_sum",
          "_id": "682586a8b1f81924e628e808",
          "id": "682586a8b1f81924e628e808"
        },
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "traceSourceId": "Traces",
        "sessionSourceId": "Sessions"
      },
      {
        "from": {
          "databaseName": "default",
          "tableName": "hyperdx_sessions"
        },
        "kind": "session",
        "timestampValueExpression": "TimestampTime",
        "name": "Sessions",
        "displayedTimestampValueExpression": "Timestamp",
        "implicitColumnExpression": "Body",
        "serviceNameExpression": "ServiceName",
        "bodyExpression": "Body",
        "eventAttributesExpression": "LogAttributes",
        "resourceAttributesExpression": "ResourceAttributes",
        "defaultTableSelectExpression": "Timestamp,ServiceName,SeverityText,Body",
        "severityTextExpression": "SeverityText",
        "traceIdExpression": "TraceId",
        "spanIdExpression": "SpanId",
        "connection": "Local ClickHouse",
        "logSourceId": "Logs",
        "traceSourceId": "Traces",
        "metricSourceId": "Metrics"
      }
    ]

  # See https://github.com/hyperdxio/hyperdx/blob/v2/packages/api/docs/auto_provision/AUTO_PROVISION.md
  # for detailed configuration options

  ingress:
    enabled: false
    ingressClassName: nginx
    annotations: {}
    # The host to use for the ingress. Defaults to localhost. Be sure to update hyperdx.frontendUrl with this host value + protocol
    host: "localhost" # Production domain
    path: "/(.*)"
    pathType: "ImplementationSpecific"
    proxyBodySize: "100m"
    proxyConnectTimeout: "60"
    proxySendTimeout: "60"
    proxyReadTimeout: "60"
    tls:
      enabled: false
      secretName: "hyperdx-tls"

    # Additional ingresses - these will only be rendered if the whole ingress object is enabled
    # This should be used to expose other deployments/services from the helm chart on the cluster
    # e.g. expose the OTEL collector.
    additionalIngresses: []
    # - name: otel-collector
    #   annotations: {}
    #   ingressClassName: nginx
    #   hosts:
    #     - host: collector.example.com
    #       paths:
    #         - path: /
    #           pathType: Prefix
    #           port: 4318
    #   tls:
    #     - secretName: otel-collector-tls
    #       hosts:
    #         - collector.example.com

  replicas: 1

  podDisruptionBudget:
    enabled: false

  # Service configuration
  service:
    type: ClusterIP # Use ClusterIP for security. For external access, use ingress with proper TLS and authentication
    # Service-level annotations (applied to the Kubernetes service resource)
    annotations:
      {}
      # Example service annotations:
      # service.beta.kubernetes.io/aws-load-balancer-internal: "true"
      # cloud.google.com/load-balancer-type: "Internal"

mongodb:
  enabled: true
  # Password for the MongoDB user. Referenced by the password Secret and mongoUri.
  password: "hyperdx"
  # Full MongoDBCommunity CRD spec -- rendered verbatim into the CR.
  # See https://github.com/mongodb/mongodb-kubernetes/tree/master/docs/mongodbcommunity
  # for all available fields. Add persistence, nodeSelector, tolerations, etc. here.
  spec:
    members: 1
    type: ReplicaSet
    version: "5.0.32"
    security:
      authentication:
        modes: ["SCRAM"]
    users:
      - name: hyperdx
        db: hyperdx
        passwordSecretRef:
          name: '{{ include "clickstack.mongodb.fullname" . }}-password'
        roles:
          - name: dbOwner
            db: hyperdx
          - name: clusterMonitor
            db: admin
        scramCredentialsSecretName: '{{ include "clickstack.mongodb.fullname" . }}-scram'
    additionalMongodConfig:
      storage.wiredTiger.engineConfig.journalCompressor: zlib

# MongoDB Kubernetes Operator (MCK) subchart configuration
# See https://github.com/mongodb/mongodb-kubernetes for all options
mongodb-kubernetes:
  operator:
    watchedResources:
      - mongodbcommunity

clickhouse:
  enabled: true
  # Ports used for cross-service wiring (OTEL collector, defaultConnections)
  port: 8123
  nativePort: 9000
  # User credentials referenced by OTEL collector env and defaultConnections
  config:
    users:
      appUserPassword: "hyperdx"
      otelUserPassword: "otelcollectorpass"
      otelUserName: "otelcollector"
  prometheus:
    enabled: true
    port: 9363
  # Full KeeperCluster CRD spec -- rendered verbatim into the CR.
  # See https://clickhouse.com/docs/clickhouse-operator/guides/introduction
  keeper:
    spec:
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  # Full ClickHouseCluster CRD spec -- rendered verbatim into the CR.
  # See https://clickhouse.com/docs/clickhouse-operator/guides/configuration
  cluster:
    spec:
      replicas: 1
      shards: 1
      keeperClusterRef:
        name: '{{ include "clickstack.clickhouse.keeper" . }}'
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
      settings:
        extraUsersConfig:
          users:
            app:
              password: '{{ .Values.clickhouse.config.users.appUserPassword }}'
              profile: readonly
              grants:
                - query: "GRANT SHOW ON *.*"
                - query: "GRANT SELECT ON system.*"
                - query: "GRANT SELECT ON default.*"
            otelcollector:
              password: '{{ .Values.clickhouse.config.users.otelUserPassword }}'
              profile: default
              grants:
                - query: "GRANT SELECT,INSERT,CREATE,SHOW ON default.*"
        extraConfig:
          max_connections: 4096
          keep_alive_timeout: 64
          max_concurrent_queries: 100

# ClickHouse Operator subchart configuration
# See https://clickhouse.com/docs/clickhouse-operator/overview for all options
clickhouse-operator:
  webhook:
    enable: false
  certManager:
    enable: false
  crd:
    enable: true

# OpenTelemetry Collector subchart configuration (alias: otel-collector)
# See https://github.com/open-telemetry/opentelemetry-helm-charts for all options
# Set otel-collector.enabled to false to disable the OTEL collector entirely.
otel-collector:
  enabled: true
  mode: deployment
  image:
    repository: docker.clickhouse.com/clickhouse/clickstack-otel-collector
    tag: ""
  extraEnvsFrom:
    - configMapRef:
        name: clickstack-config
    - secretRef:
        name: clickstack-secret
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
      appProtocol: grpc
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP
    fluentd:
      enabled: true
      containerPort: 24225
      servicePort: 24225
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
    jaeger-compact:
      enabled: false
    jaeger-thrift:
      enabled: false
    jaeger-grpc:
      enabled: false
    zipkin:
      enabled: false

tasks:
  enabled: false
  checkAlerts:
    schedule: "*/1 * * * *" # Runs every 1 minute

    additionalArgs:
      {}
      # Additional command line arguments can be supplied to the check-alerts
      # task by defining the param as a key/value pair. These are passed to the
      # task without validation in the helm chart.
      #
      # Examples:
      # concurrency: 6
      # sourceTimeoutMs: 90000

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
