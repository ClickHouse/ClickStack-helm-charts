{{- if .Values.hyperdx.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clickstack.hyperdx.fullname" . }}-network-policy
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
{{- with .Values.hyperdx.networkPolicy.spec }}
spec:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
