{{- if .Values.hyperdx.serviceAccount.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickstack.hyperdx.fullname" . }}
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
  {{- with .Values.hyperdx.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
