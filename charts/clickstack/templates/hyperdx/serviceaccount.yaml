{{- if eq (include "clickstack.hyperdx.createServiceAccount" .) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "clickstack.hyperdx.serviceAccountName" . }}
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
  {{- with .Values.hyperdx.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
