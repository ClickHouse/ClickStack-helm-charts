{{- if .Values.otel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clickstack.otel.fullname" . }}-env
  labels:
    {{- include "clickstack.labels" . | nindent 4 }}
data:
  # Environment variables for the ClickStack OTEL collector.
  # Defaults are computed from the chart's own ClickHouse and HyperDX services.
  # To point at an external service, set overrides in your values.yaml under otel.*:
  #   otel.clickhouseEndpoint     -- override CLICKHOUSE_ENDPOINT / CLICKHOUSE_SERVER_ENDPOINT
  #   otel.clickhouseUser         -- override CLICKHOUSE_USER (default: clickhouse.config.users.otelUserName)
  #   otel.clickhousePassword     -- override CLICKHOUSE_PASSWORD (default: clickhouse.config.users.otelUserPassword)
  #   otel.clickhousePrometheusEndpoint -- override CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT
  #   otel.clickhouseDatabase     -- override HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE (default: "default")
  #   otel.opampServerUrl         -- override OPAMP_SERVER_URL
  env.sh: |
    export CLICKHOUSE_ENDPOINT="{{ .Values.otel.clickhouseEndpoint | default (printf "tcp://%s:%v?dial_timeout=10s" (include "clickstack.clickhouse.svc" .) .Values.clickhouse.nativePort) }}"
    export CLICKHOUSE_SERVER_ENDPOINT="{{ .Values.otel.clickhouseEndpoint | default (printf "%s:%v" (include "clickstack.clickhouse.svc" .) .Values.clickhouse.nativePort) }}"
    {{- if .Values.clickhouse.prometheus.enabled }}
    export CLICKHOUSE_PROMETHEUS_METRICS_ENDPOINT="{{ .Values.otel.clickhousePrometheusEndpoint | default (printf "%s:%v" (include "clickstack.clickhouse.svc" .) .Values.clickhouse.prometheus.port) }}"
    {{- end }}
    export OPAMP_SERVER_URL="{{ .Values.otel.opampServerUrl | default (printf "http://%s-app:%v" (include "clickstack.fullname" .) .Values.hyperdx.opampPort) }}"
    export HYPERDX_LOG_LEVEL="{{ .Values.hyperdx.logLevel }}"
    export HYPERDX_OTEL_EXPORTER_CLICKHOUSE_DATABASE="{{ .Values.otel.clickhouseDatabase | default "default" }}"
    export HYPERDX_API_KEY="{{ .Values.hyperdx.apiKey }}"
    export CLICKHOUSE_USER="{{ .Values.otel.clickhouseUser | default .Values.clickhouse.config.users.otelUserName }}"
    export CLICKHOUSE_PASSWORD="{{ .Values.otel.clickhousePassword | default .Values.clickhouse.config.users.otelUserPassword }}"
{{- end }}
